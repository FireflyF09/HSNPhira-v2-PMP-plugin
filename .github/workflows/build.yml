name: Build WASM Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Download SDK from PMP release
        run: |
          wget -q https://github.com/HyperSynapseNetwork/Phira-mp-plus/releases/latest/download/phira-plugin-sdk.tar.gz
          tar xzf phira-plugin-sdk.tar.gz
          rm phira-plugin-sdk.tar.gz

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Build WASM plugin
        working-directory: plugin
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: hsnphira-v2-pmp-plugin.wasm
          path: plugin/target/wasm32-unknown-unknown/release/hsnphira_v2_pmp_plugin.wasm
