name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 版本号（如 0.2.0，留空自动计算）
        type: string
        default: ""
      description:
        description: 版本说明（可选）
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 确定版本号
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
            if [[ -z "$LATEST_TAG" ]]; then
              echo "tag=v0.1.0" >> $GITHUB_OUTPUT
              echo "version=0.1.0" >> $GITHUB_OUTPUT
            else
              RAW_VERSION="${LATEST_TAG#v}"
              MAJOR=$(echo "$RAW_VERSION" | cut -d. -f1)
              MINOR=$(echo "$RAW_VERSION" | cut -d. -f2)
              BASE_TAG="v${MAJOR}.${MINOR}.0"
              if git rev-parse "$BASE_TAG" >/dev/null 2>&1; then
                PATCH=$(git rev-list --count "$BASE_TAG"..HEAD)
              else
                PATCH=$(git rev-list --count HEAD)
              fi
              FULL_VERSION="${MAJOR}.${MINOR}.${PATCH}"
              echo "tag=v$FULL_VERSION" >> $GITHUB_OUTPUT
              echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 下载 SDK 依赖
        run: |
          wget -q https://github.com/HyperSynapseNetwork/Phira-mp-plus/releases/latest/download/phira-plugin-sdk.tar.gz
          tar xzf phira-plugin-sdk.tar.gz

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Install wasm-tools
        run: cargo install wasm-tools

      - name: 构建 WASM 插件
        working-directory: plugin
        run: |
          cargo build --target wasm32-unknown-unknown --release
          wasm-tools component new \
            target/wasm32-unknown-unknown/release/hsnphira_v2_pmp_plugin.wasm \
            -o target/wasm32-unknown-unknown/release/hsnphira_v2_pmp_plugin.component.wasm
          echo "构建完成: $(ls -lh target/wasm32-unknown-unknown/release/hsnphira_v2_pmp_plugin.component.wasm | awk '{print $5}')"

      - name: 创建 Release
        uses: softprops/action-gh-release@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## HSNPhira v2 PMP Plugin v${{ steps.version.outputs.version }}

            ${{ github.event.inputs.description && '### 说明' || '' }}
            ${{ github.event.inputs.description }}

            ### WASM 下载
            `plugin.wasm` — 复制到 `plugins/hsnphira-v2-pmp-plugin.wasm` 使用
          files: |
            plugin/target/wasm32-unknown-unknown/release/hsnphira_v2_pmp_plugin.component.wasm
          prerelease: false
