name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 版本号升级
        type: choice
        options:
          - minor  # B+1（默认）
          - major  # A+1
          - none   # 仅用当前 A.B + commit SHA 发布
        default: "none"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 读取当前版本
        id: version
        run: |
          # 从 Cargo.toml 读取 A.B
          FULL_VERSION=$(grep '^version = ' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          MAJOR=$(echo "$FULL_VERSION" | cut -d. -f1)
          MINOR=$(echo "$FULL_VERSION" | cut -d. -f2)

          if [[ "${{ github.event.inputs.bump }}" == "major" ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
          elif [[ "${{ github.event.inputs.bump }}" == "minor" ]]; then
            MINOR=$((MINOR + 1))
          fi

          COMMIT_SHA="${GITHUB_SHA:0:7}"
          NEW_VERSION="${MAJOR}.${MINOR}.${COMMIT_SHA}"

          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 更新 Cargo.toml 版本号
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}.0\"/" Cargo.toml

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: 下载 SDK 依赖
        run: |
          git clone --depth 1 --filter=blob:none \
            https://github.com/HyperSynapseNetwork/Phira-mp-plus \
            /tmp/phira-mp-plus
          ln -s /tmp/phira-mp-plus/phira-plugin-sdk ./phira-plugin-sdk
          ln -s /tmp/phira-mp-plus/wit ./wit

      - name: 构建 WASM 插件
        run: |
          cargo build --target wasm32-unknown-unknown --release
          echo "构建完成: $(ls -lh target/wasm32-unknown-unknown/release/hsnphira_v2_pmp_plugin.wasm | awk '{print $5}')"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## HSNPhira v2 PMP Plugin v${{ steps.version.outputs.version }}

            ### 版本信息
            - 版本号: ${{ steps.version.outputs.version }}
            - Commit: ${{ github.sha }}
            - 构建时间: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### 安装
            1. 下载 `plugin.wasm`
            2. 复制到 `data/plugins/hsnphira-v2/plugin.wasm`
            3. 创建 `data/plugins/hsnphira-v2/plugin.json`（见 README）
            4. 重启 Phira-mp+ 或执行 `plugin reload`
          files: |
            target/wasm32-unknown-unknown/release/hsnphira_v2_pmp_plugin.wasm
          draft: false
          prerelease: false
