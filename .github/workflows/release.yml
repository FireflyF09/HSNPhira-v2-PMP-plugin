name: Release

on:
  workflow_dispatch:
    inputs:
      description:
        description: 版本说明（可选）
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取最新版本标签
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
          if [[ -z "$LATEST_TAG" ]]; then
            echo "错误: 没有找到版本标签，请先运行 Bump Version workflow"
            exit 1
          fi
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "version=${LATEST_TAG#v}" >> $GITHUB_OUTPUT

      - name: 下载 SDK 依赖
        run: |
          wget https://github.com/HyperSynapseNetwork/Phira-mp-plus/releases/latest/download/phira-plugin-sdk.tar.gz
          tar xzf phira-plugin-sdk.tar.gz

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: 构建 WASM 插件
        run: |
          cargo build --target wasm32-unknown-unknown --release
          echo "构建完成: $(ls -lh target/wasm32-unknown-unknown/release/hsnphira_v2_pmp_plugin.wasm | awk '{print $5}')"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## HSNPhira v2 PMP Plugin v${{ steps.version.outputs.version }}

            ${{ github.event.inputs.description && '### 说明' || '' }}
            ${{ github.event.inputs.description }}

            ### WASM 下载
            `plugin.wasm` — 复制到 `data/plugins/hsnphira-v2/plugin.wasm` 使用
          files: |
            target/wasm32-unknown-unknown/release/hsnphira_v2_pmp_plugin.wasm
          draft: false
          prerelease: false
